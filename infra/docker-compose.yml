services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: jakegpt
      POSTGRES_USER: jakegpt
      POSTGRES_PASSWORD: jakegpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jakegpt -d jakegpt"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
